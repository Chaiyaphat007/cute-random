<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>สุ่มกำลังใจน่ารักๆ</title>

<style>
    body{
        margin:0;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background: linear-gradient(135deg,#ffd6e7,#ffeef5,#fff6d8);
        font-family: "Comic Sans MS", sans-serif;
        overflow:hidden;
    }

    .card{
        background:white;
        width:350px;
        padding:35px;
        border-radius:30px;
        text-align:center;
        box-shadow:0 10px 25px rgba(0,0,0,0.15);
        position:relative;
        z-index:2;
    }

    h1{
        color:#ff69a6;
        margin-bottom:20px;
    }

    #number{
        font-size:120px;
        font-weight:bold;
        color:#ff8fb8;
        margin:20px 0;
        transition:0.1s;
        text-shadow:3px 3px 0 #fff0f5;
    }

    .btn{
        border:none;
        padding:12px 25px;
        margin:10px;
        border-radius:50px;
        font-size:20px;
        cursor:pointer;
        transition:0.2s;
        color:white;
    }

    .start{
        background:#ff9ecf;
    }

    .stop{
        background:#ffb347;
    }

    .btn:hover{
        transform:scale(1.08);
    }

    #message{
        margin-top:20px;
        font-size:22px;
        color:#ff5c93;
        min-height:40px;
    }

    .heart{
        position:absolute;
        font-size:25px;
        animation: float 5s linear infinite;
        opacity:0.6;
    }

    @keyframes float{
        0%{
            transform:translateY(100vh) rotate(0deg);
        }
        100%{
            transform:translateY(-120vh) rotate(360deg);
        }
    }

    /* Popup */
    .popup{
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.6);
        display:none;
        justify-content:center;
        align-items:center;
        z-index:10;
    }

    .popup-content{
        background:white;
        padding:20px;
        border-radius:25px;
        text-align:center;
        max-width:90%;
    }

    .popup img,
    .popup video{
        width:300px;
        border-radius:20px;
    }

    .close-btn{
        margin-top:15px;
        background:#ff8fb8;
        color:white;
        border:none;
        padding:10px 20px;
        border-radius:20px;
        cursor:pointer;
    }

</style>
</head>

<body>

<div class="card">
    <h1>✨ สุ่มกำลังใจ ✨</h1>

    <div id="number">1</div>

    <button class="btn start" onclick="start()">🎀 เริ่ม</button>
    <button class="btn stop" onclick="stop()">💖 หยุด</button>

    <div id="message"></div>
</div>

<!-- Popup -->
<div class="popup" id="popup">
    <div class="popup-content" id="popup-content">

    </div>
</div>

<script>

let interval;
let current = 1;

const messages = {
    1: "🌸 วันนี้เธอเก่งมากเลยนะ 🌸",
    2: "💖 อย่ายอมแพ้น้า เธอทำได้แน่นอน 💖"
};

function start(){

    document.getElementById("message").innerText = "";

    interval = setInterval(()=>{

        current = Math.random() < 0.5 ? 1 : 2;

        const number = document.getElementById("number");

        number.innerText = current;

        number.style.transform = "scale(1.05)";

        setTimeout(()=>{
            number.style.transform = "scale(1)";
        },50);

    },30);
}

function stop(){

    clearInterval(interval);

    document.getElementById("message").innerText = messages[current];

    const popup = document.getElementById("popup");
    const content = document.getElementById("popup-content");

    popup.style.display = "flex";

    // ถ้าได้เลข 1 = คลิป
    if(current == 1){

        content.innerHTML = `
            <h2>🎥 คลิปกำลังใจ 💖</h2>

            <video controls autoplay>
                <source src="zz.mp4" type="video/mp4">
            </video>

            <br>

            <button class="close-btn" onclick="closePopup()">
                ปิด
            </button>
        `;

    }

    // ถ้าได้เลข 2 = รูป
    else{

        content.innerHTML = `
            <h2>🌸 รูปน่ารัก 💖</h2>

            <img src="fc.jpg">

            <br>

            <button class="close-btn" onclick="closePopup()">
                ปิด
            </button>
        `;
    }
}

function closePopup(){

    document.getElementById("popup").style.display = "none";

}

/* หัวใจลอย */

for(let i=0;i<20;i++){

    const heart = document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "💗";

    heart.style.left = Math.random()*100 + "vw";

    heart.style.animationDuration = (Math.random()*3+3) + "s";

    heart.style.fontSize = (Math.random()*20+15) + "px";

    document.body.appendChild(heart);
}

</script>

</body>
</html>
